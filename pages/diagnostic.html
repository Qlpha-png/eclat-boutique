    <style>
        .diag-page{max-width:680px;margin:0 auto;padding:40px 24px 80px;min-height:100vh}
        .diag-hero{text-align:center;margin-bottom:40px}
        .diag-hero h1{font-family:var(--font-display);font-size:2.2rem;margin-bottom:8px}
        .diag-hero p{color:var(--color-text-light);max-width:500px;margin:0 auto;line-height:1.6}
        .diag-hero .diag-stats{display:flex;justify-content:center;gap:24px;margin-top:20px;flex-wrap:wrap}
        .diag-hero .diag-stat{font-size:.8rem;color:var(--color-text-light);display:flex;align-items:center;gap:6px}

        /* Progress */
        .diag-progress-wrap{margin-bottom:32px}
        .diag-progress-bar{display:flex;gap:4px;margin-bottom:8px}
        .diag-progress-bar .seg{flex:1;height:4px;border-radius:2px;background:var(--color-border);transition:background .4s}
        .diag-progress-bar .seg.done{background:var(--color-secondary)}
        .diag-progress-bar .seg.active{background:var(--color-secondary);opacity:.6}
        .diag-progress-info{display:flex;justify-content:space-between;font-size:.78rem;color:var(--color-text-light)}
        .diag-section-label{font-weight:600;color:var(--color-secondary-text)}

        /* Steps */
        .diag-step{display:none;animation:diagFadeUp .4s ease}
        .diag-step.active{display:block}
        @keyframes diagFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        .diag-q{font-family:var(--font-display);font-size:1.3rem;margin-bottom:6px;text-align:center}
        .diag-q-sub{font-size:.85rem;color:var(--color-text-light);text-align:center;margin-bottom:24px}
        .diag-section-intro{text-align:center;padding:20px 0 8px}
        .diag-section-intro .section-icon{font-size:2rem;margin-bottom:8px;display:block}
        .diag-section-intro h3{font-family:var(--font-display);font-size:1.1rem;margin-bottom:4px}
        .diag-section-intro p{font-size:.82rem;color:var(--color-text-light)}

        /* Options */
        .diag-opts{display:flex;flex-direction:column;gap:10px}
        .diag-opt{padding:16px 20px;border:2px solid var(--color-border);border-radius:var(--radius-md);cursor:pointer;transition:all .2s;font-size:.92rem;text-align:left;display:flex;align-items:center;gap:14px;background:var(--color-white)}
        .diag-opt:hover{border-color:var(--color-secondary);transform:translateX(4px)}
        .diag-opt.selected{border-color:var(--color-secondary);background:rgba(201,168,124,.08)}
        .diag-opt .oi{font-size:1.4rem;flex-shrink:0}
        .diag-opt strong{display:block;margin-bottom:2px}
        .diag-opt small{color:var(--color-text-light);font-size:.8rem}

        /* Multi-select */
        .diag-opts--multi .diag-opt{position:relative}
        .diag-opts--multi .diag-opt::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;border:2px solid var(--color-border);border-radius:4px;transition:all .2s}
        .diag-opts--multi .diag-opt.selected::after{background:var(--color-secondary);border-color:var(--color-secondary)}
        .diag-opts--multi .diag-opt.selected::before{content:'\2713';position:absolute;right:20px;top:50%;transform:translateY(-50%);color:var(--color-white);font-size:.7rem;font-weight:700;z-index:1}
        .diag-multi-next{display:block;width:100%;margin-top:16px;padding:14px;background:var(--color-primary);color:var(--color-white);border:none;border-radius:var(--radius-xl);font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s}
        .diag-multi-next:hover{background:var(--color-secondary)}
        .diag-multi-next:disabled{opacity:.4;cursor:default}

        /* Navigation */
        .diag-nav{display:flex;justify-content:space-between;margin-top:24px}
        .diag-back{background:none;border:none;color:var(--color-text-light);font-size:.85rem;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:4px}
        .diag-back:hover{color:var(--color-secondary-text)}

        /* Result */
        .diag-result{display:none;animation:diagFadeUp .5s ease}
        .diag-result.active{display:block}
        .diag-result h2{font-family:var(--font-display);font-size:1.6rem;margin-bottom:8px;text-align:center}
        .diag-result>p{text-align:center;color:var(--color-text-light);margin-bottom:28px}

        .diag-profile{padding:24px;background:linear-gradient(135deg,rgba(201,168,124,.1),rgba(201,168,124,.03));border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:24px}
        .diag-profile h3{font-family:var(--font-display);font-size:1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .diag-profile-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
        .diag-profile-tag{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600;background:rgba(201,168,124,.15);color:var(--color-secondary-text)}

        .diag-ai-box{padding:20px 24px;background:var(--color-white);border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:24px;line-height:1.7;font-size:.92rem}
        .diag-ai-box .ai-label{font-weight:600;font-size:.8rem;color:var(--color-secondary-text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .diag-ai-box .ai-label .dot{width:8px;height:8px;background:var(--color-secondary);border-radius:50%;display:inline-block}
        .diag-ai-section{margin-bottom:16px}
        .diag-ai-section h4{font-size:.88rem;font-weight:700;margin-bottom:6px;color:var(--color-primary)}
        .diag-ai-section ul{padding-left:18px;margin:0}
        .diag-ai-section li{margin-bottom:4px;font-size:.88rem;color:var(--color-text)}

        .routine-block{margin-bottom:24px}
        .routine-block h3{font-family:var(--font-display);font-size:1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .routine-step{display:flex;gap:16px;padding:16px;background:var(--color-white);border-radius:var(--radius-md);border:1px solid var(--color-border);margin-bottom:10px;align-items:center;transition:all .2s}
        .routine-step:hover{box-shadow:var(--shadow-md);border-color:transparent}
        .routine-step .step-num{width:32px;height:32px;background:var(--color-secondary);color:var(--color-white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
        .routine-step .step-info{flex:1}
        .routine-step .step-name{font-weight:600;font-size:.9rem;margin-bottom:1px}
        .routine-step .step-product{font-size:.8rem;color:var(--color-secondary-text);font-weight:600}
        .routine-step .step-why{font-size:.78rem;color:var(--color-text-light);margin-top:2px}
        .routine-step .step-price{font-weight:700;font-size:.95rem;color:var(--color-primary);white-space:nowrap}

        .routine-total{text-align:center;padding:24px;background:linear-gradient(135deg,var(--color-primary),#1a1714);color:var(--color-white);border-radius:var(--radius-md);margin-top:24px}
        .routine-total .total-label{font-size:.85rem;opacity:.7}
        .routine-total .total-price{font-size:2rem;font-weight:700;margin:8px 0}
        .routine-total .total-savings{color:var(--color-secondary);font-weight:600}

        .diag-loader{text-align:center;padding:40px 16px}
        .diag-loader .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--color-border);border-top-color:var(--color-secondary);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .diag-loader p{font-size:.85rem;color:var(--color-text-light);margin-top:12px}

        .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

        @media(max-width:768px){
            .diag-hero h1{font-size:1.7rem}
            .diag-q{font-size:1.15rem}
        }
    </style>

        var TOTAL_Q = QUESTIONS.length;
        var answers = {};
        var currentQ = 0;

        // ============================
        // RENDER
        // ============================
        function buildProgressBar() {
            var bar = document.getElementById('progressBar');
            var html = '';
            for (var i = 0; i < TOTAL_Q; i++) {
                html += '<div class="seg" data-qi="' + i + '"></div>';
            }
            bar.innerHTML = html;
        }

        function updateProgress() {
            var segs = document.querySelectorAll('.diag-progress-bar .seg');
            for (var i = 0; i < segs.length; i++) {
                segs[i].className = 'seg';
                if (i < currentQ) segs[i].classList.add('done');
                if (i === currentQ) segs[i].classList.add('active');
            }
            var section = SECTIONS[QUESTIONS[currentQ].section];
            document.getElementById('sectionLabel').textContent = section.icon + ' ' + section.label;
            document.getElementById('progressCount').textContent = (currentQ + 1) + ' / ' + TOTAL_Q;
        }

        function renderStep(qi) {
            var q = QUESTIONS[qi];
            var container = document.getElementById('stepsContainer');

            // Show section intro if first question of a new section
            var sectionIntro = '';
            if (qi === 0 || QUESTIONS[qi - 1].section !== q.section) {
                var sec = SECTIONS[q.section];
                sectionIntro = '<div class="diag-section-intro">' +
                    '<span class="section-icon">' + sec.icon + '</span>' +
                    '<h3>' + sec.label + '</h3>' +
                    '<p>' + sec.desc + '</p>' +
                    '</div>';
            }

            var html = '<div class="diag-step active" data-qi="' + qi + '">';
            html += sectionIntro;
            html += '<h2 class="diag-q">' + q.q + '</h2>';
            if (q.sub) html += '<p class="diag-q-sub">' + q.sub + '</p>';

            html += '<div class="diag-opts' + (q.multi ? ' diag-opts--multi' : '') + '" data-name="' + q.name + '">';
            for (var i = 0; i < q.opts.length; i++) {
                var o = q.opts[i];
                var wasSelected = false;
                if (q.multi && answers[q.name]) {
                    wasSelected = answers[q.name].indexOf(o.v) !== -1;
                } else if (answers[q.name] === o.v) {
                    wasSelected = true;
                }
                html += '<div class="diag-opt' + (wasSelected ? ' selected' : '') + '" data-v="' + o.v + '">';
                html += '<span class="oi">' + o.icon + '</span>';
                html += '<div><strong>' + o.label + '</strong>';
                if (o.desc) html += '<br><small>' + o.desc + '</small>';
                html += '</div></div>';
            }
            html += '</div>';

            if (q.multi) {
                html += '<button class="diag-multi-next" id="multiNext">Continuer</button>';
            }

            html += '<div class="diag-nav">';
            if (qi > 0) {
                html += '<button class="diag-back" id="backBtn">&larr; Retour</button>';
            } else {
                html += '<span></span>';
            }
            html += '</div>';

            html += '</div>';
            container.innerHTML = html;

            // Bind events
            var opts = container.querySelectorAll('.diag-opt');
            for (var j = 0; j < opts.length; j++) {
                opts[j].addEventListener('click', q.multi ? handleMultiClick : handleSingleClick);
            }

            if (q.multi) {
                var nextBtn = document.getElementById('multiNext');
                nextBtn.addEventListener('click', function() {
                    var selected = container.querySelectorAll('.diag-opt.selected');
                    var vals = [];
                    for (var k = 0; k < selected.length; k++) {
                        vals.push(selected[k].getAttribute('data-v'));
                    }
                    if (vals.length === 0) return;
                    // If "none"/"all" is selected alone, just use that
                    if (vals.indexOf('none') !== -1) vals = ['none'];
                    if (vals.indexOf('all') !== -1) vals = ['all'];
                    answers[q.name] = vals;
                    goNext();
                });
            }

            var backBtn = document.getElementById('backBtn');
            if (backBtn) {
                backBtn.addEventListener('click', function() {
                    currentQ--;
                    updateProgress();
                    renderStep(currentQ);
                });
            }
        }

        function handleSingleClick(e) {
            var opt = e.currentTarget;
            var parent = opt.closest('.diag-opts');
            var allOpts = parent.querySelectorAll('.diag-opt');
            for (var i = 0; i < allOpts.length; i++) {
                allOpts[i].classList.remove('selected');
            }
            opt.classList.add('selected');

            var q = QUESTIONS[currentQ];
            answers[q.name] = opt.getAttribute('data-v');

            setTimeout(goNext, 350);
        }

        function handleMultiClick(e) {
            var opt = e.currentTarget;
            var v = opt.getAttribute('data-v');
            var parent = opt.closest('.diag-opts');
            var allOpts = parent.querySelectorAll('.diag-opt');

            if (v === 'none' || v === 'all') {
                // Exclusive: deselect others
                for (var i = 0; i < allOpts.length; i++) {
                    allOpts[i].classList.remove('selected');
                }
                opt.classList.add('selected');
            } else {
                // Deselect "none"/"all" if clicking something else
                for (var j = 0; j < allOpts.length; j++) {
                    var ov = allOpts[j].getAttribute('data-v');
                    if (ov === 'none' || ov === 'all') allOpts[j].classList.remove('selected');
                }
                opt.classList.toggle('selected');
            }
        }

        function goNext() {
            if (currentQ >= TOTAL_Q - 1) {
                showLoading();
                return;
            }
            currentQ++;
            updateProgress();
            renderStep(currentQ);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ============================
        // RESULTS
        // ============================
        function showLoading() {
            document.getElementById('stepsContainer').innerHTML = '';
            document.getElementById('progressWrap').style.display = 'none';

            var result = document.getElementById('diagResult');
            result.innerHTML = '<div class="diag-loader"><div class="spinner"></div><p>Analyse de votre profil en cours...</p><p style="font-size:.78rem;margin-top:4px;color:var(--color-text-light);">L\'IA \u00e9tudie vos 24 r\u00e9ponses</p></div>';
            result.classList.add('active');

            // Save to localStorage
            var diagData = JSON.parse(JSON.stringify(answers));
            diagData.date = new Date().toISOString();
            try { localStorage.setItem('eclat_diagnostic', JSON.stringify(diagData)); } catch(e) {}

            // Call AI API
            fetchAIAnalysis(diagData);
        }

        function fetchAIAnalysis(diagData) {
            fetch('/api/diagnostic-ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(diagData)
            })
            .then(function(r) { return r.ok ? r.json() : Promise.reject(r); })
            .then(function(data) {
                renderResult(diagData, data);
            })
            .catch(function() {
                // Fallback: render result without AI analysis
                renderResult(diagData, null);
            });
        }

        function renderResult(diagData, aiData) {
            var result = document.getElementById('diagResult');

            // Build profile tags
            var tags = [];
            var skinLabels = { dry: 'Peau s\u00e8che', oily: 'Peau grasse', combo: 'Peau mixte', normal: 'Peau normale', sensitive: 'Peau sensible' };
            if (skinLabels[diagData.skinType]) tags.push(skinLabels[diagData.skinType]);
            var concernLabels = { acne: 'Anti-acn\u00e9', aging: 'Anti-\u00e2ge', glow: '\u00c9clat', hydration: 'Hydratation', pores: 'Pores', 'dark-circles': 'Cernes' };
            if (concernLabels[diagData.concern1]) tags.push(concernLabels[diagData.concern1]);
            if (diagData.concern2 && diagData.concern2 !== 'none' && concernLabels[diagData.concern2]) tags.push(concernLabels[diagData.concern2]);
            var ageLabel = diagData.age || '';
            if (ageLabel) tags.push(ageLabel + ' ans');
            var envLabels = { urban: 'Urbain', suburban: 'P\u00e9riurbain', rural: 'Rural', coastal: 'Bord de mer' };
            if (envLabels[diagData.environment]) tags.push(envLabels[diagData.environment]);

            // Build routine based on concerns + skin type
            var morningSteps = buildMorningRoutine(diagData);
            var eveningSteps = buildEveningRoutine(diagData);

            // All recommended product IDs
            var allIds = [];
            morningSteps.forEach(function(s) { if (allIds.indexOf(s.id) === -1) allIds.push(s.id); });
            eveningSteps.forEach(function(s) { if (allIds.indexOf(s.id) === -1) allIds.push(s.id); });

            var totalPrice = 0;
            allIds.forEach(function(id) {
                var p = PRODUCTS.find(function(pr) { return pr.id === id; });
                if (p) totalPrice += p.price;
            });

            var html = '';
            html += '<h2>Votre diagnostic complet</h2>';
            html += '<p>Bas\u00e9 sur vos 24 r\u00e9ponses, voici votre analyse personnalis\u00e9e.</p>';

            // Profile summary
            html += '<div class="diag-profile">';
            html += '<h3>\uD83D\uDCCB Votre profil</h3>';
            html += '<div class="diag-profile-tags">';
            tags.forEach(function(t) { html += '<span class="diag-profile-tag">' + t + '</span>'; });
            html += '</div></div>';

            // AI Analysis
            if (aiData && aiData.analysis) {
                html += '<div class="diag-ai-box">';
                html += '<div class="ai-label"><span class="dot"></span>Analyse personnalis\u00e9e par l\'IA</div>';
                html += '<div>' + formatAIAnalysis(aiData.analysis) + '</div>';
                html += '</div>';
            }

            // Morning routine
            html += '<div class="routine-block">';
            html += '<h3>\u2600\uFE0F Routine Matin</h3>';
            html += renderRoutineSteps(morningSteps);
            html += '</div>';

            // Evening routine
            html += '<div class="routine-block">';
            html += '<h3>\uD83C\uDF19 Routine Soir</h3>';
            html += renderRoutineSteps(eveningSteps);
            html += '</div>';

            // Bundle suggestion
            var bundleHtml = '';
            if (typeof BUNDLES !== 'undefined') {
                var matchedBundle = null;
                for (var b = 0; b < BUNDLES.length; b++) {
                    var overlap = 0;
                    for (var bi = 0; bi < BUNDLES[b].productIds.length; bi++) {
                        if (allIds.indexOf(BUNDLES[b].productIds[bi]) !== -1) overlap++;
                    }
                    if (overlap >= 2) { matchedBundle = BUNDLES[b]; break; }
                }
                if (matchedBundle) {
                    var bundleIndividual = 0;
                    matchedBundle.productIds.forEach(function(id) {
                        var p = PRODUCTS.find(function(pr) { return pr.id === id; });
                        if (p) bundleIndividual += p.price;
                    });
                    var saving = (bundleIndividual - matchedBundle.price).toFixed(2).replace('.', ',');
                    bundleHtml = '<div style="margin-top:20px;padding:16px 20px;background:#f0f7f0;border:1px solid #c8e6c9;border-radius:12px;text-align:center;">' +
                        '<p style="font-size:.85rem;color:#2e7d32;margin:0 0 8px;font-weight:600;">\u2728 Le ' + matchedBundle.name + ' contient ces produits !</p>' +
                        '<p style="font-size:.82rem;color:#558b2f;margin:0 0 12px;">' + matchedBundle.price.toFixed(2).replace('.', ',') + ' \u20ac au lieu de ' + bundleIndividual.toFixed(2).replace('.', ',') + ' \u20ac \u2014 \u00e9conomisez ' + saving + ' \u20ac</p>' +
                        '<button class="btn btn-primary" style="background:#2e7d32;border:none;cursor:pointer;font-size:.9rem;" data-action="add-bundle" data-bundle="' + matchedBundle.key + '">Prendre le coffret</button>' +
                        '</div>';
                }
            }

            // Total
            html += '<div class="routine-total">';
            html += '<div class="total-label">Votre routine compl\u00e8te (matin + soir)</div>';
            html += '<div class="total-price">' + totalPrice.toFixed(2).replace('.', ',') + ' \u20ac</div>';
            html += '<div class="total-savings">Livraison offerte ' + (totalPrice >= 29 ? '\u2713 (incluse !)' : 'd\u00e8s 29\u20ac') + '</div>';
            html += '<button class="btn btn-primary" style="margin-top:16px;display:inline-block;background:var(--color-secondary);border:none;cursor:pointer;" data-action="add-all">Ajouter tout au panier</button>';
            html += bundleHtml;
            html += '</div>';

            // Retake + home links
            html += '<div style="text-align:center;margin-top:24px;display:flex;flex-direction:column;gap:8px;">';
            html += '<button style="background:none;border:none;color:var(--color-secondary-text);font-size:.88rem;cursor:pointer;font-weight:600;" data-action="retake">\u21bb Refaire le diagnostic</button>';
            html += '<a href="../index.html" style="color:var(--color-text-light);font-size:.85rem;">Retour \u00e0 l\'accueil</a>';
            html += '</div>';

            result.innerHTML = html;

            // Bind add-all button
            var addAllBtn = result.querySelector('[data-action="add-all"]');
            if (addAllBtn) {
                addAllBtn.addEventListener('click', function() {
                    addProductsToCart(allIds);
                });
            }

            // Bind bundle button
            var bundleBtn = result.querySelector('[data-action="add-bundle"]');
            if (bundleBtn) {
                bundleBtn.addEventListener('click', function() {
                    addBundleToCart(this.getAttribute('data-bundle'));
                });
            }

            // Bind retake
            var retakeBtn = result.querySelector('[data-action="retake"]');
            if (retakeBtn) {
                retakeBtn.addEventListener('click', function() {
                    answers = {};
                    currentQ = 0;
                    document.getElementById('diagResult').classList.remove('active');
                    document.getElementById('diagResult').innerHTML = '';
                    document.getElementById('progressWrap').style.display = '';
                    document.getElementById('diagHero').style.display = '';
                    buildProgressBar();
                    updateProgress();
                    renderStep(0);
                });
            }
        }

        function formatAIAnalysis(text) {
            // Simple markdown-ish formatting
            return text
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        }

        function renderRoutineSteps(steps) {
            var html = '';
            for (var i = 0; i < steps.length; i++) {
                var s = steps[i];
                var product = PRODUCTS.find(function(p) { return p.id === s.id; });
                if (!product) continue;
                html += '<div class="routine-step">';
                html += '<div class="step-num">' + (i + 1) + '</div>';

        }

        // ============================
        // CART ACTIONS
        // ============================
        function addProductsToCart(ids) {
            var existing = [];
            try { existing = JSON.parse(localStorage.getItem('eclat_cart')) || []; } catch(e) {}
            ids.forEach(function(id) {
                var product = PRODUCTS.find(function(p) { return p.id === id; });
                if (!product) return;
                var inCart = existing.find(function(item) { return item.id === id; });
                if (inCart) {
                    inCart.qty += 1;
                } else {
                    existing.push({ id: product.id, name: product.name, price: product.price, image: product.image || (product.images && product.images[0]) || '', qty: 1 });
                }
            });
            localStorage.setItem('eclat_cart', JSON.stringify(existing));
            window.location.href = '../index.html?openCart=1';
        }

        function addBundleToCart(bundleKey) {
            if (typeof BUNDLES === 'undefined') return;
            var bundle = BUNDLES.find(function(b) { return b.key === bundleKey; });
            if (!bundle) return;
            var firstProduct = PRODUCTS.find(function(p) { return p.id === bundle.productIds[0]; });
            var existing = [];
            try { existing = JSON.parse(localStorage.getItem('eclat_cart')) || []; } catch(e) {}
            var bundleId = 'bundle-' + bundle.key;
            var inCart = existing.find(function(item) { return item.id === bundleId; });
            if (inCart) {
                inCart.qty += 1;
            } else {
                existing.push({ id: bundleId, name: bundle.name, price: bundle.price, image: firstProduct ? (firstProduct.image || firstProduct.images[0]) : '', qty: 1 });
            }
            localStorage.setItem('eclat_cart', JSON.stringify(existing));
            window.location.href = '../index.html?openCart=1';
        }

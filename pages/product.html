<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Produit - &Eacute;CLAT</title>
    <meta name="description" id="pageDesc" content="">
    <meta property="og:type" content="product">
    <meta property="og:locale" content="fr_FR">
    <meta name="robots" content="index, follow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://oss-cf.cjdropshipping.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .product-page { max-width:1000px; margin:40px auto; padding:0 24px 80px; }
        .pp-grid { display:grid; grid-template-columns:1fr 1fr; gap:48px; align-items:start; }
        .pp-image { border-radius:var(--radius-lg); overflow:hidden; background:var(--color-bg-alt); }
        .pp-image img { width:100%; height:auto; display:block; }
        .pp-info { display:flex; flex-direction:column; gap:16px; }
        .pp-category { font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; color:var(--color-secondary); font-weight:600; }
        .pp-name { font-family:var(--font-display); font-size:2rem; line-height:1.2; }
        .pp-rating { color:var(--color-star); font-size:1.1rem; }
        .pp-price { font-size:1.8rem; font-weight:700; color:var(--color-primary); }
        .pp-desc { font-size:0.95rem; color:var(--color-text-light); line-height:1.8; }
        .pp-features { list-style:none; padding:0; display:flex; flex-direction:column; gap:8px; }
        .pp-features li { padding:8px 0; border-bottom:1px solid var(--color-border); font-size:0.9rem; }
        .pp-features li::before { content:'\2713'; color:var(--color-secondary); font-weight:700; margin-right:10px; }
        .pp-trust { display:flex; gap:16px; flex-wrap:wrap; margin-top:8px; }
        .pp-trust span { font-size:0.8rem; background:var(--color-bg-alt); padding:6px 12px; border-radius:var(--radius-sm); }
        .pp-actions { display:flex; gap:12px; margin-top:8px; }
        .pp-actions .btn { flex:1; text-align:center; }
        .pp-guide { margin-top:12px; }
        .pp-guide a { color:var(--color-secondary); font-weight:600; font-size:0.9rem; text-decoration:none; }
        .pp-guide a:hover { text-decoration:underline; }
        .pp-back { display:inline-block; margin-bottom:24px; color:var(--color-secondary); text-decoration:none; font-size:0.9rem; }
        @media (max-width:768px) {
            .pp-grid { grid-template-columns:1fr; gap:24px; }
            .pp-name { font-size:1.5rem; }
        }
    </style>
    <script id="productSchema" type="application/ld+json"></script>
</head>
<body style="background:var(--color-bg);">
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">&Eacute;CLAT</a>
            <a href="../index.html" style="font-size:0.9rem;color:var(--color-secondary);">&larr; Retour boutique</a>
        </div>
    </nav>

    <div class="product-page">
        <a href="../index.html#produits" class="pp-back">&larr; Tous les produits</a>
        <div class="pp-grid">
            <div class="pp-image" id="ppImage"></div>
            <div class="pp-info" id="ppInfo"></div>
        </div>
    </div>

    <script src="../js/products.js"></script>
    <script>
        var catLabels = {
            visage: 'Soins visage', soin: 'Skincare', corps: 'Corps & fitness',
            outils: 'Outils beaut\u00e9', aromatherapie: 'Bien-\u00eatre'
        };
        var guideMap = {
            1:'led', 2:'guasha', 3:'ultrasons', 4:'ultrasons', 5:'cryo',
            6:'ems', 7:'led', 8:'vitc', 9:'collagene', 10:'collagene',
            11:'rosehip', 12:'collagene'
        };

        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        var params = new URLSearchParams(window.location.search);
        var id = parseInt(params.get('id'));
        var product = PRODUCTS.find(function(p) { return p.id === id; });

        if (!product) {
            document.getElementById('ppImage').innerHTML = '<p style="padding:40px;text-align:center;">Produit introuvable</p>';
        } else {
            // Set page meta
            document.title = escapeHTML(product.name) + ' - \u00c9CLAT';
            document.getElementById('pageDesc').setAttribute('content', product.description);

            // Set JSON-LD Product schema
            document.getElementById('productSchema').textContent = JSON.stringify({
                "@context": "https://schema.org",
                "@type": "Product",
                "name": product.name,
                "description": product.description,
                "image": product.image,
                "brand": { "@type": "Brand", "name": "\u00c9CLAT" },
                "offers": {
                    "@type": "Offer",
                    "price": product.price.toFixed(2),
                    "priceCurrency": "EUR",
                    "availability": "https://schema.org/InStock",
                    "url": "https://maison-eclat.shop/pages/product.html?id=" + product.id
                }
            });

            // Render image
            document.getElementById('ppImage').innerHTML =
                '<img src="' + escapeHTML(product.image) + '" alt="' + escapeHTML(product.name) + '">';

            // Render info
            var guide = guideMap[product.id];
            var guideHTML = guide
                ? '<div class="pp-guide"><a href="guide-beaute.html#' + guide + '">Lire l\'\u00e9tude scientifique \u2192</a></div>'
                : '';

            document.getElementById('ppInfo').innerHTML =
                '<div class="pp-category">' + (catLabels[product.category] || product.category) + '</div>' +
                '<h1 class="pp-name">' + escapeHTML(product.name) + '</h1>' +
                '<div class="pp-rating">' + '\u2605'.repeat(Math.floor(product.rating)) + ' <span style="color:var(--color-text-light);font-size:0.9rem;">' + product.rating + '/5</span></div>' +
                '<div class="pp-price">' + product.price.toFixed(2).replace('.', ',') + ' \u20ac</div>' +
                '<p class="pp-desc">' + escapeHTML(product.description) + '</p>' +
                guideHTML +
                '<ul class="pp-features">' + product.features.map(function(f) { return '<li>' + escapeHTML(f) + '</li>'; }).join('') + '</ul>' +
                '<div class="pp-trust">' +
                    '<span><span aria-hidden="true">&#128666;</span> Livraison suivie</span>' +
                    '<span><span aria-hidden="true">&#128260;</span> Satisfait 30j</span>' +
                    '<span><span aria-hidden="true">&#128274;</span> Paiement s\u00e9curis\u00e9</span>' +
                '</div>' +
                '<div class="pp-actions">' +
                    '<a href="../index.html?produit=' + product.id + '" class="btn btn-primary">Ajouter au panier</a>' +
                '</div>';
        }
    </script>
</body>
</html>

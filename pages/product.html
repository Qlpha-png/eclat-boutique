    <!-- Dynamically update hreflang with product ID -->
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var pid = params.get('id');
        if (pid) {
            var hreflangs = document.querySelectorAll('link[hreflang]');
            hreflangs.forEach(function(link) {
                var href = link.getAttribute('href');
                var url = new URL(href);
                url.searchParams.set('id', pid);
                link.setAttribute('href', url.toString());
            });
        }
    })();
    </script>

    <script>
    // Lazy-load only the needed i18n translation file (~235-251KB each)
    // French users load NOTHING extra (data already in products.js)
    (function() {
        var basePath = '../js/';
        var i18nApplierVersion = '5';
        var supportedLangs = ['en','es','de'];

        function loadI18nForLang(lang, callback) {
            if (lang === 'fr' || supportedLangs.indexOf(lang) === -1) {
                if (callback) callback();
                return;
            }
            if ((lang === 'en' && typeof PRODUCT_I18N_EN !== 'undefined') ||
                (lang === 'es' && typeof PRODUCT_I18N_ES !== 'undefined') ||
                (lang === 'de' && typeof PRODUCT_I18N_DE !== 'undefined')) {
                if (callback) callback();
                return;
            }
            var s = document.createElement('script');
            s.src = basePath + 'products-i18n-' + lang + '.js?v=2';
            s.onload = function() { if (callback) callback(); };
            s.onerror = function() { if (callback) callback(); };
            document.head.appendChild(s);
        }

        function loadI18nApplier() {
            if (typeof getProductText !== 'undefined') return;
            var s2 = document.createElement('script');
            s2.src = basePath + 'products-i18n.js?v=' + i18nApplierVersion;
            document.head.appendChild(s2);
        }

        var lang = (typeof currentLang !== 'undefined') ? currentLang
                 : (localStorage.getItem('eclat_lang') || navigator.language.substring(0,2) || 'fr');

        if (lang !== 'fr' && supportedLangs.indexOf(lang) !== -1) {
            loadI18nForLang(lang, function() { loadI18nApplier(); });
        } else {
            loadI18nApplier();
        }

        window._loadProductI18n = function(lang, callback) {
            loadI18nForLang(lang, function() {
                loadI18nApplier();
                if (callback) callback();
            });
        };
    })();
    </script>

            5: { flag: '\uD83C\uDDF0\uD83C\uDDF7', text: 'Acier inoxydable m\u00e9dical, fabriqu\u00e9 en Asie', country: 'CN' },
            6: { flag: '\uD83C\uDDF0\uD83C\uDDF7', text: 'Technologie EMS, fabriqu\u00e9 en Asie', country: 'CN' },
            7: { flag: '\uD83C\uDDF0\uD83C\uDDF7', text: 'C\u00e9ramique pi\u00e9zo\u00e9lectrique, fabriqu\u00e9 en Asie', country: 'CN' },
            8: { flag: '\uD83C\uDDEB\uD83C\uDDF7', text: 'Formule Vitamine C stabilis\u00e9e, fabriqu\u00e9 en Asie', country: 'CN' },
            9: { flag: '\uD83C\uDDF0\uD83C\uDDF7', text: 'Inspir\u00e9 K-beauty, collag\u00e8ne + or 24K', country: 'KR' },
            10: { flag: '\uD83C\uDDF0\uD83C\uDDF7', text: 'Inspir\u00e9 K-beauty, collag\u00e8ne bio-actif', country: 'KR' },
            11: { flag: '\uD83C\uDDE8\uD83C\uDDF1', text: 'Huile de rose musqu\u00e9e, origine Chili', country: 'CL' },
            12: { flag: '\uD83C\uDDF0\uD83C\uDDF7', text: 'Micro-aiguilles acide hyaluronique, fabriqu\u00e9 en Asie', country: 'CN' },
            13: { flag: '\uD83C\uDDEF\uD83C\uDDF5', text: 'Chaleur naturelle, parfum lavande', country: 'CN' },
            14: { flag: '\uD83C\uDDF0\uD83C\uDDF7', text: 'Verre borosilicate, diffusion ultrasonique', country: 'CN' },
            15: { flag: '\uD83C\uDDEB\uD83C\uDDF7', text: 'Satin anti-frizz, mousse m\u00e9moire de forme', country: 'CN' }
        };
        var defaultOrigin = { flag: '\uD83C\uDDEB\uD83C\uDDF7', text: 'S\u00e9lectionn\u00e9 par \u00c9CLAT', country: 'CN' };

        var guideMap = {
            1:'led', 2:'guasha', 3:'ultrasons', 4:'ultrasons', 5:'cryo',
            6:'ems', 7:'led', 8:'vitc', 9:'collagene', 10:'collagene',
            11:'rosehip', 12:'collagene'
        };

        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        var params = new URLSearchParams(window.location.search);
        var id = parseInt(params.get('id'));
        var product = PRODUCTS.find(function(p) { return p.id === id; });

        if (!product) {
            document.getElementById('ppImage').innerHTML = '<p style="padding:40px;text-align:center;">Produit introuvable</p>';
        } else {
            // Translated product fields
            var pName = (typeof getProductText === 'function') ? getProductText(product.id, 'name', lang) : product.name;
            var pDesc = (typeof getProductText === 'function') ? getProductText(product.id, 'description', lang) : product.description;
            var pFeatures = (typeof getProductText === 'function' && lang !== 'fr') ? getProductText(product.id, 'features', lang) : null;
            var pSpecs = (typeof getProductText === 'function' && lang !== 'fr') ? getProductText(product.id, 'specs', lang) : null;
            var pHowTo = (typeof getProductText === 'function' && lang !== 'fr') ? getProductText(product.id, 'howTo', lang) : null;
            var pCatLabel = (typeof getCategoryText === 'function') ? getCategoryText(product.category, lang) : (catLabels[product.category] || product.category);
            // Use translated if available, fallback to FR original
            if (!pName) pName = product.name;
            if (!pDesc) pDesc = product.description;
            if (!pFeatures || !pFeatures.length) pFeatures = product.features;
            if (!pHowTo) pHowTo = product.howTo;

            // Set page meta
            document.title = escapeHTML(pName) + ' - \u00c9CLAT';
            document.getElementById('pageDesc').setAttribute('content', pDesc);

            // Set OG & Twitter meta tags dynamically
            // Ensure absolute URL for og:image (social crawlers need full URLs)
            var absImage = product.image;
            if (absImage && absImage.indexOf('http') !== 0) {
                absImage = 'https://maison-eclat.shop' + (absImage.charAt(0) === '/' ? '' : '/') + absImage.replace(/^\.\.\//g, '');
            }
            var ogImg = document.getElementById('ogImage');
            if (ogImg) ogImg.setAttribute('content', absImage);
            var ogDesc = document.getElementById('ogDesc');
            if (ogDesc) ogDesc.setAttribute('content', pDesc);
            var twTitle = document.getElementById('twTitle');
            if (twTitle) twTitle.setAttribute('content', escapeHTML(pName) + ' - \u00c9CLAT');
            var twDesc = document.getElementById('twDesc');
            if (twDesc) twDesc.setAttribute('content', pDesc);
            var twImg = document.getElementById('twImage');
            if (twImg) twImg.setAttribute('content', absImage);

            // Set canonical URL with product ID
            var canonical = document.getElementById('canonicalLink');
            if (canonical) canonical.href = 'https://maison-eclat.shop/pages/product.html?id=' + product.id;

            // Set JSON-LD Product schema (enriched with sku, brand, aggregateRating, offers)
            var productSchemaData = {
                "@context": "https://schema.org",
                "@type": "Product",
                "name": pName,
                "description": pDesc,
                "image": product.image,
                "sku": "ECLAT-" + String(product.id).padStart(4, '0'),
                "mpn": "ECLAT-" + String(product.id).padStart(4, '0'),
                "brand": {
                    "@type": "Brand",
                    "name": "\u00c9CLAT",
                    "url": "https://maison-eclat.shop"
                },
                "category": catLabels[product.category] || product.category,
                "countryOfOrigin": (originMap[product.id] || defaultOrigin).country,
                "offers": {
                    "@type": "Offer",
                    "price": product.price.toFixed(2),
                    "priceCurrency": "EUR",
                    "availability": "https://schema.org/InStock",
                    "itemCondition": "https://schema.org/NewCondition",
                    "url": "https://maison-eclat.shop/pages/product.html?id=" + product.id,
                    "seller": {
                        "@type": "Organization",
                        "name": "Maison \u00c9clat"
                    },
                    "shippingDetails": {
                        "@type": "OfferShippingDetails",
                        "shippingDestination": {
                            "@type": "DefinedRegion",
                            "addressCountry": "FR"
                        },
                        "deliveryTime": {
                            "@type": "ShippingDeliveryTime",
                            "handlingTime": {
                                "@type": "QuantitativeValue",
                                "minValue": 1,
                                "maxValue": 3,
                                "unitCode": "DAY"
                            },
                            "transitTime": {
                                "@type": "QuantitativeValue",
                                "minValue": 7,
                                "maxValue": 14,
                                "unitCode": "DAY"
                            }
                        },
                        "shippingRate": {
                            "@type": "MonetaryAmount",
                            "value": "0",
                            "currency": "EUR"
                        }
                    },
                    "hasMerchantReturnPolicy": {
                        "@type": "MerchantReturnPolicy",
                        "applicableCountry": "FR",
                        "returnPolicyCategory": "https://schema.org/MerchantReturnFiniteReturnWindow",
                        "merchantReturnDays": 30,
                        "returnMethod": "https://schema.org/ReturnByMail"
                    }
                },
                "aggregateRating": (product.reviews && product.reviews > 0) ? {
                    "@type": "AggregateRating",
                    "ratingValue": product.rating,
                    "reviewCount": product.reviews,
                    "bestRating": 5,
                    "worstRating": 1
                } : undefined
            };
            document.getElementById('productSchema').textContent = JSON.stringify(productSchemaData);

            // BreadcrumbList schema
            var breadcrumbScript = document.createElement('script');
            breadcrumbScript.type = 'application/ld+json';
            breadcrumbScript.textContent = JSON.stringify({
                "@context": "https://schema.org",
                "@type": "BreadcrumbList",
                "itemListElement": [
                    { "@type": "ListItem", "position": 1, "name": "\u00c9CLAT", "item": "https://maison-eclat.shop/" },
                    { "@type": "ListItem", "position": 2, "name": "Produits", "item": "https://maison-eclat.shop/#produits" },
                    { "@type": "ListItem", "position": 3, "name": pName, "item": "https://maison-eclat.shop/pages/product.html?id=" + product.id }
                ]
            });
            document.head.appendChild(breadcrumbScript);

            // Track recently viewed
            if (typeof RecentlyViewed !== 'undefined') RecentlyViewed.add(product);

            // Stock & delivery estimation
            (function() {
                var sdEl = document.getElementById('ppStockDelivery');
                if (!sdEl) return;
                // Delivery estimate: J+7 to J+14
                var now = new Date();
                var d1 = new Date(now.getTime() + 7 * 86400000);
                var d2 = new Date(now.getTime() + 14 * 86400000);
                var opts = { day: 'numeric', month: 'long' };
                var deliveryHTML = '<div style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--color-text);margin-bottom:8px;">' +

                sdEl.innerHTML = deliveryHTML + '<div id="ppStockIndicator"></div>';

                fetch('/api/stock?productId=' + product.id)
                    .then(function(r) { return r.ok ? r.json() : Promise.reject(); })

            var guide = guideMap[product.id];
            var guideHTML = guide
                ? '<div class="pp-guide"><a href="guide-beaute.html#' + guide + '">Lire l\'\u00e9tude scientifique \u2192</a></div>'
                : '';

            // Build specs HTML — use translated specs if available
            var specsHTML = '';
            var displaySpecs = (pSpecs && typeof pSpecs === 'object' && Object.keys(pSpecs).length > 0) ? pSpecs : product.specs;
            if (displaySpecs) {
                specsHTML = '<div class="pp-section"><h2>Sp\u00e9cifications techniques</h2><dl class="pp-specs">';
                var specLabels = { puissance:'Puissance', longueurs:'Longueurs d\'onde', batterie:'Batterie', poids:'Poids', materiau:'Mat\u00e9riau', dimensions:'Dimensions', entretien:'Entretien', frequence:'Fr\u00e9quence', modes:'Modes', etancheite:'\u00c9tanch\u00e9it\u00e9', tetes:'T\u00eates', vitesse:'Vitesse', technologie:'Technologie', particules:'Particules', reservoir:'R\u00e9servoir', autonomie:'Autonomie', concentration:'Concentration', ph:'pH', contenance:'Contenance', conservation:'Conservation', temperature:'Temp\u00e9rature', rotation:'Rotation', contenu:'Contenu', duree_pose:'Dur\u00e9e de pose', type:'Type', purete:'Puret\u00e9', extraction:'Extraction', zones:'Zones', reutilisable:'R\u00e9utilisable', duree:'Dur\u00e9e', parfum:'Parfum', capacite:'Capacit\u00e9', couverture:'Couverture', bruit:'Bruit', arret:'Arr\u00eat auto', longueur:'Longueur' };
                for (var key in displaySpecs) {
                    specsHTML += '<dt>' + (specLabels[key] || key) + '</dt><dd>' + escapeHTML(displaySpecs[key]) + '</dd>';
                }
                specsHTML += '</dl></div>';
            }

            // Build ingredients HTML with Clean Beauty Score
            var ingredientsHTML = '';
            if (product.ingredients) {
                if (window.CleanBeauty && window.INGREDIENTS_DB) {
                    var cbResult = CleanBeauty.renderSection(product);
                    ingredientsHTML = cbResult.html;
                    // Bind tooltips after DOM update
                    setTimeout(function() { CleanBeauty.bindTooltips(cbResult.result); }, 100);
                } else {
                    ingredientsHTML = '<div class="pp-section"><h2>Composition / Ingr\u00e9dients</h2><div class="pp-ingredients">' + escapeHTML(product.ingredients) + '</div></div>';
                }
            }

            // Build how-to HTML — use translated howTo if available
            var howToHTML = '';
            var displayHowTo = pHowTo || product.howTo;
            if (displayHowTo) {
                howToHTML = '<div class="pp-section"><h2>Mode d\'emploi</h2><div class="pp-howto">' + escapeHTML(displayHowTo) + '</div></div>';
            }

            var prodOrigin = originMap[product.id] || defaultOrigin;

            document.getElementById('ppInfo').innerHTML =
                '<div class="pp-category">' + escapeHTML(pCatLabel) + '</div>' +
                '<h1 class="pp-name">' + escapeHTML(pName) + '</h1>' +
                '<div style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--color-text-light);margin:-8px 0 4px;"><span>' + prodOrigin.flag + '</span> <span>' + escapeHTML(prodOrigin.text) + '</span></div>' +
                (product.reviews > 0 ? '<div class="pp-rating">' + '\u2605'.repeat(Math.floor(product.rating)) + ' <span style="color:var(--color-text-light);font-size:0.9rem;">' + product.rating + '/5 (' + product.reviews + ' avis)</span></div>' : '<div class="pp-rating" style="font-size:0.9rem;color:var(--color-text-light);">Aucun avis &mdash; <a href="#ppReviews" style="color:var(--color-secondary);text-decoration:underline;">Soyez le premier !</a></div>') +
                (typeof SocialShare !== 'undefined' ? '<div style="margin:8px 0;">' + SocialShare.renderButtons({ title: pName + ' | \u00c9CLAT', size: 30 }) + '</div>' : '') +
                '<div class="pp-price">' + product.price.toFixed(2).replace('.', ',') + ' \u20ac</div>' +
                '<p class="pp-desc">' + escapeHTML(pDesc) + '</p>' +
                guideHTML +
                '<ul class="pp-features">' + (pFeatures || product.features || []).map(function(f) { return '<li>' + escapeHTML(f) + '</li>'; }).join('') + '</ul>' +
                '<div class="pp-trust">' +
                    '<span><span aria-hidden="true">&#128666;</span> Livraison suivie</span>' +
                    '<span><span aria-hidden="true">&#128260;</span> Satisfait 30j</span>' +
                    '<span><span aria-hidden="true">&#128274;</span> Paiement s\u00e9curis\u00e9</span>' +
                '</div>' +
                '<div class="pp-actions" style="display:flex;gap:12px;align-items:center;">' +
                    '<a href="../index.html?produit=' + product.id + '" class="btn btn-primary" style="flex:1;">Ajouter au panier</a>' +
                    (typeof Wishlist !== 'undefined' ? Wishlist.heartHTML(product.id, 26) : '') +
                '</div>' +
                '<div id="ppStockDelivery"></div>' +
                '<div class="pp-badges">' +
                    (product.features && product.features.indexOf('Certifi\u00e9 CE') !== -1 ? '<div class="pp-cert"><span class="pp-cert-dot" style="background:#2196f3;"></span> Certifi\u00e9 CE</div>' : '') +
                    '<div class="pp-cert"><span class="pp-cert-dot" style="background:#9c27b0;"></span> Garantie 30j</div>' +
                    '<div class="pp-cert"><span class="pp-cert-dot" style="background:#4caf50;"></span> Retour gratuit 14j</div>' +
                    '<div class="pp-cert"><span class="pp-cert-dot" style="background:#2196f3;"></span> SAV r\u00e9actif</div>' +
                '</div>' +
                howToHTML +
                specsHTML +
                ingredientsHTML +
                '<div id="ppWhyForYou"></div>';

            // "Pourquoi ce produit pour vous" — personnalisé si diagnostic fait
            (function() {
                var diag;
                try { diag = JSON.parse(localStorage.getItem('eclat_diagnostic')); } catch(e) {}
                var container = document.getElementById('ppWhyForYou');
                if (!container) return;

                if (!diag || !diag.skinType || !diag.concern) {
                    // Pas de diagnostic → CTA vers diagnostic
                    container.innerHTML = '<div class="pp-section" style="text-align:center;padding:24px;background:linear-gradient(135deg,rgba(201,168,124,0.06),transparent);border:1px dashed var(--color-border);border-radius:var(--radius-md);">' +
                        '<h2 style="font-size:1.1rem;margin-bottom:8px;">Ce produit est-il fait pour vous ?</h2>' +
                        '<p style="font-size:0.85rem;color:var(--color-text-light);margin-bottom:16px;">Faites votre diagnostic beaut\u00e9 gratuit en 60 secondes pour d\u00e9couvrir si ce produit correspond \u00e0 votre peau.</p>' +
                        '<a href="diagnostic.html" class="btn btn-primary" style="font-size:0.85rem;">Faire mon diagnostic</a>' +
                    '</div>';
                    return;
                }

                // Diagnostic existant → appel IA
                var skinLabels = { dry:'S\u00e8che', oily:'Grasse', combo:'Mixte', sensitive:'Sensible' };
                var concernLabels = { acne:'Acn\u00e9 & imperfections', aging:'Anti-\u00e2ge & fermet\u00e9', glow:'\u00c9clat & teint', hydration:'Hydratation' };
                container.innerHTML = '<div class="pp-section">' +
                    '<h2>Pourquoi ce produit pour vous ?</h2>' +
                    '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">' +
                        '<span style="font-size:0.78rem;padding:4px 10px;background:rgba(201,168,124,0.12);border-radius:12px;color:var(--color-secondary);font-weight:600;">Peau ' + (skinLabels[diag.skinType] || diag.skinType) + '</span>' +
                        '<span style="font-size:0.78rem;padding:4px 10px;background:rgba(201,168,124,0.12);border-radius:12px;color:var(--color-secondary);font-weight:600;">' + (concernLabels[diag.concern] || diag.concern) + '</span>' +
                    '</div>' +
                    '<div id="ppRecoLoader" style="text-align:center;padding:12px;"><div style="display:inline-block;width:20px;height:20px;border:2px solid var(--color-border);border-top-color:var(--color-secondary);border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>' +
                    '<div id="ppRecoText" style="display:none;line-height:1.7;font-size:0.9rem;color:var(--color-text);"></div>' +
                '</div>';

                fetch('/api/product-recommendation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        productName: product.name,
                        productDescription: product.description || '',
                        productIngredients: product.ingredients || '',
                        skinType: diag.skinType,
                        concern: diag.concern,
                        lang: 'fr'
                    })
                })
                .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
                .then(function(data) {
                    document.getElementById('ppRecoLoader').style.display = 'none';
                    if (data && data.recommendation) {
                        var el = document.getElementById('ppRecoText');
                        el.textContent = data.recommendation;
                        el.style.display = 'block';
                    }
                })
                .catch(function() {
                    document.getElementById('ppRecoLoader').style.display = 'none';
                });
            })();

            // Cross-sell: related products
            var crossSellMap = {
                1:[8,3], 2:[5,6], 3:[8,4], 4:[3,8], 5:[2,9],
                6:[2,5], 7:[1,10], 8:[11,9], 9:[8,12], 10:[8,7],
                11:[8,10], 12:[9,11], 13:[14,7], 14:[13,15], 15:[2,5]
            };
            var related = (crossSellMap[product.id] || [])
                .map(function(rid){return PRODUCTS.find(function(p){return p.id===rid;});})
                .filter(Boolean);

            if (related.length > 0) {
                document.getElementById('ppCrossSell').innerHTML =
                    '<div class="pp-cross-sell"><h2>Compl\u00e8te ta routine</h2><div class="pp-cs-grid">' +
                    related.map(function(p){
                        var csName = (typeof getProductText === 'function') ? (getProductText(p.id, 'name', lang) || p.name) : p.name;
                        return '<a href="product.html?id='+p.id+'" class="pp-cs-card">' +
                            '<img src="'+escapeHTML(p.image)+'" alt="'+escapeHTML(csName)+'" width="180" height="120" loading="lazy" referrerpolicy="no-referrer">' +
                            '<div class="pp-cs-name">'+escapeHTML(csName)+'</div>' +
                            '<div class="pp-cs-price">'+p.price.toFixed(2).replace('.',',')+' \u20ac</div>' +
                        '</a>';
                    }).join('') +
                    '</div></div>';
            }

            // Recently viewed section
            if (typeof RecentlyViewed !== 'undefined') {
                var rvHTML = RecentlyViewed.renderSection(product.id);
                if (rvHTML) {
                    var rvDiv = document.createElement('div');
                    rvDiv.style.cssText = 'max-width:800px;margin:0 auto;';
                    rvDiv.innerHTML = rvHTML;
                    document.getElementById('ppCrossSell').after(rvDiv);
                }
            }

            // Sticky add-to-cart bar (appears when CTA scrolls out of view)
            var stickyBar = document.getElementById('stickyATC');
            document.getElementById('stickyName').textContent = pName;
            document.getElementById('stickyPrice').textContent = product.price.toFixed(2).replace('.',',') + ' \u20ac';
            document.getElementById('stickyBtn').href = '../index.html?produit=' + product.id;

            var mainCTA = document.querySelector('.pp-actions .btn');
            if (mainCTA) {
                var observer = new IntersectionObserver(function(entries){
                    stickyBar.style.display = entries[0].isIntersecting ? 'none' : 'block';
                }, {threshold:0});
                observer.observe(mainCTA);
            }

            // Load reviews
            loadReviews(product.id, product);
        }

        function loadReviews(productId, product) {
            var container = document.getElementById('ppReviews');
            if (!container) return;

            fetch('/api/reviews?productId=' + productId)
                .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
                .then(function(data) { renderReviews(container, data, productId, product); })
                .catch(function() {
                    // Fallback: show form only
                    renderReviews(container, { reviews: [], aggregate: { average: 0, count: 0, distribution: {5:0,4:0,3:0,2:0,1:0} } }, productId, product);
                });
        }

        function renderReviews(container, data, productId, product) {
            var agg = data.aggregate;
            var reviews = data.reviews || [];
            var stars = function(n) { var s = ''; for (var i = 1; i <= 5; i++) s += '<span style="color:' + (i <= n ? '#f59e0b' : '#d1d5db') + ';">\u2605</span>'; return s; };

            var html = '<div style="padding:24px 0;">';
            html += '<h2 style="font-family:var(--font-display);font-size:1.4rem;margin-bottom:20px;">Avis clients</h2>';

            // Aggregate
            if (agg.count > 0) {
                html += '<div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap;">';
                html += '<div style="text-align:center;"><div style="font-size:2.4rem;font-weight:700;color:var(--color-primary);">' + agg.average + '</div><div style="font-size:1.1rem;">' + stars(Math.round(agg.average)) + '</div><div style="font-size:0.8rem;color:var(--color-text-light);">' + agg.count + ' avis</div></div>';
                html += '<div style="flex:1;min-width:180px;">';
                for (var s = 5; s >= 1; s--) {
                    var pct = agg.count > 0 ? Math.round((agg.distribution[s] || 0) / agg.count * 100) : 0;
                    html += '<div style="display:flex;align-items:center;gap:8px;font-size:0.78rem;margin-bottom:3px;"><span style="width:16px;text-align:right;">' + s + '</span><div style="flex:1;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:#f59e0b;border-radius:3px;"></div></div><span style="width:28px;color:var(--color-text-light);">' + pct + '%</span></div>';
                }
                html += '</div></div>';

                // Enrich JSON-LD with real aggregateRating and review data from API
                var schema = document.getElementById('productSchema');
                if (schema && product) {
                    try {
                        var ld = JSON.parse(schema.textContent);
                        ld.aggregateRating = {
                            "@type": "AggregateRating",
                            "ratingValue": agg.average,
                            "bestRating": 5,
                            "worstRating": 1,
                            "reviewCount": agg.count
                        };
                        // Add individual reviews to schema (max 5 for performance)
                        if (reviews.length > 0) {
                            ld.review = reviews.slice(0, 5).map(function(r) {
                                return {
                                    "@type": "Review",
                                    "reviewRating": {
                                        "@type": "Rating",
                                        "ratingValue": r.rating,
                                        "bestRating": 5
                                    },
                                    "author": {
                                        "@type": "Person",
                                        "name": r.name || "Client v\u00e9rifi\u00e9"
                                    },
                                    "datePublished": r.created_at ? r.created_at.split('T')[0] : "",
                                    "reviewBody": r.comment || ""
                                };
                            });
                        }
                        schema.textContent = JSON.stringify(ld);
                    } catch(e) {}
                }
            }

            // Review list
            if (reviews.length > 0) {
                html += '<div style="display:flex;flex-direction:column;gap:16px;">';
                for (var i = 0; i < reviews.length; i++) {
                    var r = reviews[i];
                    var dateStr = new Date(r.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
                    html += '<div style="padding:16px;background:var(--color-white);border:1px solid var(--color-border);border-radius:var(--radius-md);">';
                    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
                    html += '<div>' + stars(r.rating);
                    if (r.verified) html += ' <span style="font-size:0.72rem;padding:2px 8px;background:#dcfce7;color:#16a34a;border-radius:10px;font-weight:600;">Achat v\u00e9rifi\u00e9</span>';
                    html += '</div>';
                    html += '<span style="font-size:0.75rem;color:var(--color-text-light);">' + dateStr + '</span>';
                    html += '</div>';
                    if (r.title) html += '<div style="font-weight:600;margin-bottom:4px;">' + escapeHTML(r.title) + '</div>';
                    html += '<p style="font-size:0.88rem;color:var(--color-text);line-height:1.6;margin:0;">' + escapeHTML(r.body) + '</p>';
                    if (r.photos && r.photos.length > 0) {
                        html += '<div style="display:flex;gap:8px;margin-top:10px;">';
                        for (var p = 0; p < r.photos.length; p++) {
                            html += '<img src="' + escapeHTML(r.photos[p]) + '" alt="Photo avis" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--color-border);cursor:pointer;" onclick="window.open(this.src)">';
                        }
                        html += '</div>';
                    }
                    html += '</div>';
                }
                html += '</div>';
            } else {
                html += '<p style="color:var(--color-text-light);font-size:0.9rem;text-align:center;padding:16px 0;">Aucun avis pour le moment. Soyez le premier !</p>';
            }

            // Submit form CTA
            html += '<div style="text-align:center;margin-top:24px;">';
            html += '<button onclick="toggleReviewForm()" class="btn btn-primary" style="font-size:0.85rem;">Laisser un avis (+15 \u00c9clats)</button>';
            html += '</div>';

            // Hidden form
            html += '<div id="reviewFormWrap" style="display:none;margin-top:20px;padding:24px;background:var(--color-white);border:1px solid var(--color-border);border-radius:var(--radius-md);">';
            html += '<h3 style="font-family:var(--font-display);font-size:1.1rem;margin-bottom:16px;">Votre avis</h3>';
            html += '<div id="reviewFormMsg" style="display:none;padding:12px;border-radius:8px;margin-bottom:12px;font-size:0.85rem;"></div>';
            html += '<div style="margin-bottom:12px;"><label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:6px;">Note</label><div id="reviewStars" style="font-size:1.8rem;cursor:pointer;">';
            for (var j = 1; j <= 5; j++) {
                html += '<span data-star="' + j + '" style="color:#d1d5db;" onmouseover="hoverStar(' + j + ')" onmouseout="resetStars()" onclick="selectStar(' + j + ')">\u2605</span>';
            }
            html += '</div></div>';
            html += '<div style="margin-bottom:12px;"><label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:6px;">Titre (optionnel)</label><input type="text" id="reviewTitle" maxlength="200" style="width:100%;padding:10px 12px;border:1px solid var(--color-border);border-radius:8px;font-family:inherit;font-size:0.9rem;box-sizing:border-box;"></div>';
            html += '<div style="margin-bottom:12px;"><label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:6px;">Votre avis</label><textarea id="reviewBody" rows="4" maxlength="2000" style="width:100%;padding:10px 12px;border:1px solid var(--color-border);border-radius:8px;font-family:inherit;font-size:0.9rem;resize:vertical;box-sizing:border-box;" placeholder="Partagez votre exp\u00e9rience avec ce produit..."></textarea></div>';
            html += '<div style="margin-bottom:16px;"><label style="font-size:0.78rem;color:var(--color-text-light);display:flex;align-items:center;gap:6px;"><input type="checkbox" id="reviewConsent"> J\'autorise \u00c9CLAT \u00e0 publier cet avis (RGPD Art. 6)</label></div>';
            html += '<button onclick="submitReview(' + productId + ')" class="btn btn-primary" style="width:100%;">Envoyer mon avis</button>';
            html += '</div>';

            html += '</div>';
            container.innerHTML = html;
        }

        var selectedRating = 0;
        function hoverStar(n) {
            var spans = document.querySelectorAll('#reviewStars span');
            for (var i = 0; i < spans.length; i++) spans[i].style.color = (i < n) ? '#f59e0b' : '#d1d5db';
        }
        function resetStars() { hoverStar(selectedRating); }
        function selectStar(n) { selectedRating = n; hoverStar(n); }

        function toggleReviewForm() {
            var wrap = document.getElementById('reviewFormWrap');
            if (wrap) wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
        }

        function submitReview(productId) {
            var msg = document.getElementById('reviewFormMsg');
            if (!selectedRating) { showMsg(msg, 'Veuillez s\u00e9lectionner une note.', '#fef2f2', '#dc2626'); return; }
            var body = (document.getElementById('reviewBody').value || '').trim();
            if (!body) { showMsg(msg, 'Veuillez \u00e9crire votre avis.', '#fef2f2', '#dc2626'); return; }
            var consent = document.getElementById('reviewConsent');
            if (!consent || !consent.checked) { showMsg(msg, 'Veuillez accepter la publication (RGPD).', '#fef2f2', '#dc2626'); return; }

            var token = null;
            try { var s = JSON.parse(localStorage.getItem('sb-session')); token = s && s.access_token; } catch(e) {}
            if (!token) { showMsg(msg, 'Connectez-vous pour laisser un avis.', '#fef2f2', '#dc2626'); return; }

            var title = (document.getElementById('reviewTitle').value || '').trim();

            fetch('/api/reviews', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ productId: productId, rating: selectedRating, title: title, body: body, photos: [] })
            })
            .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(res) {
                if (res.ok) {
                    showMsg(msg, res.data.message + (res.data.verified ? ' (Achat v\u00e9rifi\u00e9 \u2713)' : '') + ' +' + res.data.eclatsEarned + ' \u00c9clats !', '#f0fdf4', '#16a34a');
                    document.getElementById('reviewBody').value = '';
                    document.getElementById('reviewTitle').value = '';
                    selectedRating = 0; resetStars();
                } else {
                    showMsg(msg, res.data.error || 'Erreur', '#fef2f2', '#dc2626');
                }
            })
            .catch(function() { showMsg(msg, 'Erreur de connexion.', '#fef2f2', '#dc2626'); });
        }

        function showMsg(el, text, bg, color) {
            el.textContent = text;
            el.style.background = bg;
            el.style.color = color;
            el.style.display = 'block';
        }
    </script>
    <script src="../js/themes.js?v=2" defer></script>
    <script src="../js/social-proof.js?v=2" defer></script>
    <script src="../js/auth.js?v=2" defer></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
</main>
<script src="../js/push.js?v=2" defer></script>
</body>

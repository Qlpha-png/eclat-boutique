    <script>
    // Lazy-load only the needed i18n translation file (~235-251KB each)
    // French users load NOTHING extra (data already in products.js)
    (function() {
        var basePath = '../js/';
        var i18nApplierVersion = '5';
        var supportedLangs = ['en','es','de'];

        function loadI18nForLang(lang, callback) {
            if (lang === 'fr' || supportedLangs.indexOf(lang) === -1) {
                if (callback) callback();
                return;
            }
            if ((lang === 'en' && typeof PRODUCT_I18N_EN !== 'undefined') ||
                (lang === 'es' && typeof PRODUCT_I18N_ES !== 'undefined') ||
                (lang === 'de' && typeof PRODUCT_I18N_DE !== 'undefined')) {
                if (callback) callback();
                return;
            }
            var s = document.createElement('script');
            s.src = basePath + 'products-i18n-' + lang + '.js?v=2';
            s.onload = function() { if (callback) callback(); };
            s.onerror = function() { if (callback) callback(); };
            document.head.appendChild(s);
        }

        function loadI18nApplier() {
            if (typeof getProductText !== 'undefined') return;
            var s2 = document.createElement('script');
            s2.src = basePath + 'products-i18n.js?v=' + i18nApplierVersion;
            document.head.appendChild(s2);
        }

        var lang = (typeof currentLang !== 'undefined') ? currentLang
                 : (localStorage.getItem('eclat_lang') || navigator.language.substring(0,2) || 'fr');

        if (lang !== 'fr' && supportedLangs.indexOf(lang) !== -1) {
            loadI18nForLang(lang, function() { loadI18nApplier(); });
        } else {
            loadI18nApplier();
        }

        window._loadProductI18n = function(lang, callback) {
            loadI18nForLang(lang, function() {
                loadI18nApplier();
                if (callback) callback();
            });
        };
    })();
    </script>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var rawCat = params.get('cat') || '';
        var page = parseInt(params.get('page'), 10) || 1;
        var sort = params.get('sort') || 'popular';
        var lang = (typeof currentLang !== 'undefined') ? currentLang : 'fr';

        var FILTERS = [
            { key: '', label: 'Tous' },
            { key: 'outils', label: 'Dispositifs' },
            { key: 'accessoire', label: 'Accessoires' },
            { key: 'serums', label: 'Sérums' },
            { key: 'soins-cibles', label: 'Soins ciblés' },
            { key: 'coffrets', label: 'Coffrets' }
        ];

        var CATEGORY_META = {
            '': {
                title: 'Sélection Maison Éclat',
                desc: 'Une boutique resserrée autour des appareils experts, sérums ciblés et coffrets premium Maison Éclat.'
            },
            outils: {
                title: 'Dispositifs Premium',
                desc: 'Les appareils visage et outils experts Maison Éclat pour nettoyer, préparer, tonifier et stimuler la peau.'
            },
            accessoire: {
                title: 'Accessoires Beauté',
                desc: 'Une sélection courte d accessoires premium pour le massage facial et le drainage à la maison.'
            },
            soin: {
                title: 'Skincare Science-Driven',
                desc: 'Les soins ciblés et sérums essentiels Maison Éclat pour une routine courte, lisible et efficace.'
            },
            serums: {
                title: 'Sérums Ciblés',
                desc: 'Vitamine C, niacinamide, peptides, hyaluronique et actifs correcteurs pour une routine experte sans superflu.'
            },
            'soins-cibles': {
                title: 'Soins Yeux & Lèvres',
                desc: 'Les essentiels ciblés pour le regard, les lèvres et les zones marquées.'
            },
            coffrets: {
                title: 'Coffrets Maison Éclat',
                desc: 'Quatre routines prêtes à l emploi pour simplifier l achat et créer une expérience premium cohérente.'
            }
        };

        var BUNDLE_ROUTES = {
            eclat: '/products/coffret-eclat.html',
            antiage: '/products/coffret-anti-age.html',
            glow: '/products/coffret-glow.html',
            soin: '/products/coffret-soin.html'
        };

        function normalizeCat(value) {
            if (!value) return '';
            if (value === 'outils' || value === 'dispositifs') return 'outils';
            if (value === 'accessoire' || value === 'accessoires') return 'accessoire';
            if (value === 'serums') return 'serums';
            if (value === 'soins-cibles') return 'soins-cibles';
            if (value === 'coffrets') return 'coffrets';
            if (value === 'soin' || value === 'visage' || value === 'skincare' || value === 'corps') return 'soin';
            if (value === 'cheveux' || value === 'aromatherapie') return 'accessoire';
            if (value === 'homme') return 'outils';
            if (value === 'ongles') return 'soins-cibles';
            return '';
        }

        function escapeHTML(value) {
            if (typeof value !== 'string') return value;
            var div = document.createElement('div');
            div.textContent = value;
            return div.innerHTML;
        }

        function formatPrice(value) {
            return parseFloat(value).toFixed(2).replace('.', ',') + ' \u20ac';
        }

        function getProduct(productId) {
            if (typeof PRODUCTS === 'undefined') return null;
            for (var i = 0; i < PRODUCTS.length; i++) {
                if (PRODUCTS[i].id === productId) return PRODUCTS[i];
            }
            return null;
        }

        function getImageUrl(url) {
            if (!url) return '';
            if (url.indexOf('/api/img') === 0 || url.indexOf('/assets/') === 0) return url;
            if (url.indexOf('cjdropshipping.com') !== -1) return '/api/img?url=' + encodeURIComponent(url);
            return url;
        }

        function buildBundleCards() {
            if (typeof BUNDLES === 'undefined') return [];
            return BUNDLES.map(function(bundle, index) {
                var bundleProducts = (bundle.productIds || []).map(getProduct).filter(Boolean);
                var compareAt = bundleProducts.reduce(function(sum, product) {
                    return sum + (product.price || 0);
                }, 0);
                var firstProduct = bundleProducts[0] || {};
                return {
                    kind: 'bundle',
                    id: 'bundle-' + bundle.key,
                    key: bundle.key,
                    priority: index + 1,
                    category: 'coffrets',
                    catalogGroup: 'coffrets',
                    name: bundle.name,
                    description: bundle.description || 'Routine premium Maison Éclat.',
                    price: bundle.price,
                    compareAt: compareAt > bundle.price ? compareAt : null,
                    image: firstProduct.image || '/favicon-192.png',
                    badge: 'coffret',
                    route: BUNDLE_ROUTES[bundle.key] || '/index.html#packs'
                };
            });
        }

        function getAllItems() {
            var productItems = (typeof PRODUCTS !== 'undefined' ? PRODUCTS.slice() : []).map(function(product) {
                return {
                    kind: 'product',
                    id: product.id,
                    priority: 100 + (product.bestsellerRank || product.id),
                    category: product.category,
                    catalogGroup: product.catalogGroup || product.category,
                    name: product.name,
                    description: product.description || '',
                    price: product.price,
                    oldPrice: product.oldPrice || product.compare_at_price || null,
                    image: product.image || '',
                    badge: product.badge || '',
                    rating: product.rating || 0,
                    reviews: product.reviews || 0,
                    bestseller: !!product.bestseller,
                    bestsellerRank: product.bestsellerRank || 999
                };
            });
            return productItems.concat(buildBundleCards());
        }

        function filterItems(items, cat) {
            if (!cat) return items;
            if (cat === 'coffrets') return items.filter(function(item) { return item.kind === 'bundle'; });
            if (cat === 'serums') return items.filter(function(item) { return item.kind === 'product' && item.catalogGroup === 'serums'; });
            if (cat === 'soins-cibles') return items.filter(function(item) { return item.kind === 'product' && item.catalogGroup === 'soins-cibles'; });
            if (cat === 'soin') return items.filter(function(item) { return item.kind === 'product' && item.category === 'soin'; });
            if (cat === 'outils' || cat === 'accessoire') {
                return items.filter(function(item) { return item.kind === 'product' && item.category === cat; });
            }
            return items;
        }

        function sortItems(items, sortKey) {
            var copy = items.slice();
            if (sortKey === 'price_asc') {
                copy.sort(function(a, b) { return a.price - b.price; });
                return copy;
            }
            if (sortKey === 'price_desc') {
                copy.sort(function(a, b) { return b.price - a.price; });
                return copy;
            }
            if (sortKey === 'newest') {
                copy.sort(function(a, b) {
                    var aId = typeof a.id === 'number' ? a.id : 0;
                    var bId = typeof b.id === 'number' ? b.id : 0;
                    return bId - aId;
                });
                return copy;
            }
            copy.sort(function(a, b) {
                var aScore = (a.kind === 'bundle' ? 0 : 1) + (a.bestseller ? 2 : 0);
                var bScore = (b.kind === 'bundle' ? 0 : 1) + (b.bestseller ? 2 : 0);
                if (aScore !== bScore) return bScore - aScore;
                if ((a.bestsellerRank || 999) !== (b.bestsellerRank || 999)) return (a.bestsellerRank || 999) - (b.bestsellerRank || 999);
                return (a.priority || 999) - (b.priority || 999);
            });
            return copy;
        }

        function getFilterHref(filterKey) {
            if (!filterKey) return '/pages/category.html';
            return '/pages/category.html?cat=' + encodeURIComponent(filterKey);
        }

        function renderFilterPills(allItems, activeCat) {
            var filterHtml = FILTERS.map(function(filter) {
                var count = filterItems(allItems, filter.key).length;
                return '<a href="' + getFilterHref(filter.key) + '" class="' + (activeCat === filter.key ? 'active' : '') + '">' +
                    escapeHTML(filter.label) + ' (' + count + ')</a>';
            }).join('');
            document.getElementById('catSubcats').innerHTML = filterHtml;
        }

        function renderGrid(items, total, totalPages) {
            var grid = document.getElementById('catGrid');
            document.getElementById('catCount').textContent = total + ' élément' + (total > 1 ? 's' : '');

            if (!items.length) {
                grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--color-text-light);padding:40px;">Aucun produit dans cette sélection.</p>';
                document.getElementById('catPagination').innerHTML = '';
                return;
            }

            grid.innerHTML = items.map(function(item) {
                var href = item.kind === 'bundle' ? item.route : '/pages/product.html?id=' + item.id;
                var image = getImageUrl(item.image);
                var oldPrice = item.compareAt || item.oldPrice;
                var name = item.name;
                if (item.kind === 'product' && typeof getProductText === 'function') {
                    name = getProductText(item.id, 'name', lang) || item.name;
                }
                var cta = item.kind === 'bundle'
                    ? '<span class="cat-card-btn">Voir le coffret</span>'
                    : '<button class="cat-card-btn" data-action="add-to-cart" data-pid="' + item.id + '">Ajouter au panier</button>';
                return '<a href="' + href + '" class="cat-card" data-product-id="' + escapeHTML(String(item.id)) + '" style="text-decoration:none;color:inherit;">' +
                    '<div class="cat-card-img">' +
                    '<img src="' + escapeHTML(image) + '" alt="' + escapeHTML(name) + '" width="300" height="260" loading="lazy">' +
                    (item.badge ? '<span class="cat-card-badge">' + escapeHTML(item.badge) + '</span>' : '') +
                    '</div>' +
                    '<div class="cat-card-info">' +
                    '<div class="cat-card-name">' + escapeHTML(name) + '</div>' +
                    '<div class="cat-card-price">' + formatPrice(item.price) +
                    (oldPrice ? '<span class="old">' + formatPrice(oldPrice) + '</span>' : '') +
                    '</div></div>' +
                    cta +
                    '</a>';
            }).join('');

            var pag = document.getElementById('catPagination');
            if (totalPages <= 1) {
                pag.innerHTML = '';
                return;
            }

            var paginationHtml = '';
            paginationHtml += '<button ' + (page <= 1 ? 'disabled' : '') + ' data-page-nav="' + (page - 1) + '">&laquo;</button>';
            for (var i = 1; i <= totalPages; i++) {
                if (i <= 5 || i === totalPages) {
                    paginationHtml += '<button class="' + (i === page ? 'active' : '') + '" data-page-nav="' + i + '">' + i + '</button>';
                } else if (i === 6) {
                    paginationHtml += '<button disabled>...</button>';
                }
            }
            paginationHtml += '<button ' + (page >= totalPages ? 'disabled' : '') + ' data-page-nav="' + (page + 1) + '">&raquo;</button>';
            pag.innerHTML = paginationHtml;
        }

        function loadProducts() {
            var grid = document.getElementById('catGrid');
            grid.innerHTML = '<div class="cat-skeleton"></div><div class="cat-skeleton"></div><div class="cat-skeleton"></div><div class="cat-skeleton"></div>';

            var allItems = getAllItems();
            var currentCat = normalizeCat(rawCat);
            var filtered = filterItems(allItems, currentCat);
            var sorted = sortItems(filtered, document.getElementById('sortSelect').value);
            var perPage = 24;
            var totalPages = Math.max(1, Math.ceil(sorted.length / perPage));
            if (page > totalPages) page = totalPages;
            var paged = sorted.slice((page - 1) * perPage, page * perPage);
            renderGrid(paged, sorted.length, totalPages);
        }

        function refreshMeta() {
            var cat = normalizeCat(rawCat);
            var meta = CATEGORY_META[cat] || CATEGORY_META[''];
            document.getElementById('catTitle').textContent = meta.title;
            document.getElementById('catDesc').textContent = meta.desc;
            document.getElementById('pageTitle').textContent = meta.title + ' - \u00c9CLAT';
            document.getElementById('pageDesc').setAttribute('content', meta.desc);
            var bcCat = document.getElementById('breadcrumbCategory');
            if (bcCat) bcCat.textContent = meta.title;
            var ogDesc = document.getElementById('ogDesc');
            if (ogDesc) ogDesc.setAttribute('content', meta.desc);
            var twTitle = document.getElementById('twTitle');
            if (twTitle) twTitle.setAttribute('content', meta.title + ' - \u00c9CLAT');
            var twDesc = document.getElementById('twDesc');
            if (twDesc) twDesc.setAttribute('content', meta.desc);
            var canonicalUrl = 'https://maison-eclat.shop/pages/category.html';
            if (cat) canonicalUrl += '?cat=' + encodeURIComponent(cat);
            var canonical = document.getElementById('canonicalLink');
            if (canonical) canonical.href = canonicalUrl;
            document.getElementById('breadcrumbLD').textContent = JSON.stringify({
                '@context': 'https://schema.org',
                '@type': 'BreadcrumbList',
                itemListElement: [
                    { '@type': 'ListItem', position: 1, name: '\u00c9CLAT', item: 'https://maison-eclat.shop' },
                    { '@type': 'ListItem', position: 2, name: 'Boutique', item: 'https://maison-eclat.shop/pages/category.html' },
                    { '@type': 'ListItem', position: 3, name: meta.title }
                ]
            });
        }

        window.goPage = function(nextPage) {
            page = nextPage;
            var url = new URL(window.location.href);
            if (page > 1) url.searchParams.set('page', page);
            else url.searchParams.delete('page');
            window.history.pushState({}, '', url);
            loadProducts();
            window.scrollTo(0, 0);
        };

        document.getElementById('sortSelect').value = sort;
        refreshMeta();
        renderFilterPills(getAllItems(), normalizeCat(rawCat));
        loadProducts();

        document.getElementById('catPagination').addEventListener('click', function(e) {
            var btn = e.target.closest('[data-page-nav]');
            if (!btn || btn.disabled) return;
            goPage(parseInt(btn.getAttribute('data-page-nav'), 10));
        });

        document.getElementById('catGrid').addEventListener('click', function(e) {
            var btn = e.target.closest('[data-action="add-to-cart"]');
            if (!btn) return;
            e.preventDefault();
            e.stopPropagation();
            var pid = parseInt(btn.getAttribute('data-pid'), 10);
            if (pid && typeof addToCart === 'function') addToCart(pid);
        });

        document.getElementById('sortSelect').addEventListener('change', function() {
            page = 1;
            loadProducts();
        });
    })();
    </script>

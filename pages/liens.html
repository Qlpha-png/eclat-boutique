    <style>
        /* Self-hosted fonts */
        @font-face {
            font-family: 'Inter';
            font-style: normal;
            font-weight: 100 900;
            font-display: optional;
            src: url('../fonts/inter-latin.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }
        @font-face {
            font-family: 'Playfair Display';
            font-style: normal;
            font-weight: 400 900;
            font-display: optional;
            src: url('../fonts/playfair-latin.woff2') format('woff2');
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        /* Variables */
        :root {
            --color-primary: #2d2926;
            --color-secondary: #c9a87c;
            --color-accent: #e8c8a0;
            --color-text-light: #a39e99;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius-lg: 20px;
            --radius-xl: 30px;
        }

        /* Reset */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-primary);
            color: #fff;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem 3rem;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Container */
        .bio-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        /* Profile image */
        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--color-secondary);
            box-shadow: 0 0 24px rgba(201, 168, 124, 0.25);
            margin-bottom: 0.25rem;
        }

        /* Brand header */
        .brand-name {
            font-family: var(--font-display);
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #fff;
            line-height: 1.1;
        }

        .brand-tagline {
            font-size: 0.875rem;
            color: var(--color-text-light);
            letter-spacing: 0.04em;
            margin-top: 0.15rem;
        }

        /* Buttons shared */
        .bio-links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .bio-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: var(--radius-xl);
            font-family: var(--font-body);
            font-size: 0.9375rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            line-height: 1.3;
            -webkit-tap-highlight-color: transparent;
        }

        /* Primary CTA */
        .bio-link--primary {
            background: linear-gradient(135deg, var(--color-secondary), var(--color-accent));
            color: var(--color-primary);
            border: none;
            box-shadow: 0 4px 20px rgba(201, 168, 124, 0.3);
        }
        .bio-link--primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201, 168, 124, 0.45);
        }
        .bio-link--primary:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(201, 168, 124, 0.25);
        }

        /* Secondary buttons */
        .bio-link--secondary {
            background: transparent;
            color: #fff;
            border: 1.5px solid rgba(201, 168, 124, 0.4);
        }
        .bio-link--secondary:hover {
            border-color: var(--color-secondary);
            background: rgba(201, 168, 124, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(201, 168, 124, 0.15);
        }
        .bio-link--secondary:active {
            transform: translateY(0);
            background: rgba(201, 168, 124, 0.12);
        }

        /* Offer banner */
        .offer-banner {
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, rgba(201, 168, 124, 0.15), rgba(232, 200, 160, 0.1));
            border: 1px dashed var(--color-secondary);
            text-align: center;
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--color-accent);
            letter-spacing: 0.02em;
            margin-top: 0.25rem;
        }

        .offer-code {
            display: inline-block;
            background: var(--color-secondary);
            color: var(--color-primary);
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.8125rem;
            letter-spacing: 0.05em;
            margin-left: 0.25rem;
        }

        /* Social icons row */
        .social-row {
            display: flex;
            gap: 1.25rem;
            margin-top: 0.75rem;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text-light);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .social-icon:hover {
            background: rgba(201, 168, 124, 0.15);
            border-color: var(--color-secondary);
            color: var(--color-secondary);
            transform: translateY(-2px);
        }
        .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Footer */
        .bio-footer {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            line-height: 1.6;
        }
        .bio-footer a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .bio-footer a:hover {
            color: var(--color-secondary);
        }

        /* Subtle entrance animation */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .bio-container > * {
            animation: fadeUp 0.5s ease-out both;
        }
        .bio-container > *:nth-child(1) { animation-delay: 0s; }
        .bio-container > *:nth-child(2) { animation-delay: 0.05s; }
        .bio-container > *:nth-child(3) { animation-delay: 0.1s; }
        .bio-container > *:nth-child(4) { animation-delay: 0.15s; }
        .bio-container > *:nth-child(5) { animation-delay: 0.2s; }
        .bio-container > *:nth-child(6) { animation-delay: 0.25s; }
        .bio-container > *:nth-child(7) { animation-delay: 0.3s; }
        .bio-container > *:nth-child(8) { animation-delay: 0.35s; }

        /* Safe area for notched phones */
        @supports (padding: env(safe-area-inset-bottom)) {
            body {
                padding-bottom: calc(3rem + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cr&eacute;er un compte - &Eacute;CLAT</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-page{max-width:440px;margin:60px auto;padding:0 24px 80px;}
        .auth-card{background:var(--color-white);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:40px 32px;}
        .auth-card h1{font-family:var(--font-display);font-size:1.8rem;text-align:center;margin-bottom:8px;}
        .auth-card .subtitle{text-align:center;color:var(--color-text-light);margin-bottom:32px;font-size:0.9rem;}
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;font-size:0.85rem;font-weight:600;margin-bottom:6px;}
        .form-group input{width:100%;padding:12px 16px;border:1px solid var(--color-border);border-radius:var(--radius-md);font-size:0.95rem;font-family:var(--font-body);box-sizing:border-box;}
        .form-group input:focus{outline:none;border-color:var(--color-secondary);}
        .auth-btn{width:100%;padding:14px;background:var(--color-primary);color:var(--color-white);border:none;border-radius:var(--radius-xl);font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.3s;}
        .auth-btn:hover{background:var(--color-secondary);}
        .auth-btn:disabled{opacity:0.5;cursor:not-allowed;}
        .auth-links{text-align:center;margin-top:24px;font-size:0.85rem;}
        .auth-links a{color:var(--color-secondary);text-decoration:none;font-weight:600;}
        .auth-error{background:#fef2f2;color:#dc2626;padding:12px 16px;border-radius:var(--radius-md);font-size:0.85rem;margin-bottom:16px;display:none;}
        .perks{background:var(--color-bg-alt);border-radius:var(--radius-md);padding:16px 20px;margin-bottom:24px;font-size:0.85rem;}
        .perks li{margin-bottom:6px;line-height:1.6;}
        .pwd-strength{height:4px;border-radius:2px;margin-top:6px;transition:all 0.3s;}
    </style>
</head>
<body style="background:var(--color-bg);">
    <nav class="navbar"><div class="nav-container"><a href="../index.html" class="logo">&Eacute;CLAT</a></div></nav>

    <div class="auth-page">
        <div class="auth-card">
            <h1>Cr&eacute;er un compte</h1>
            <p class="subtitle">Rejoignez la communaut&eacute; &Eacute;CLAT</p>

            <ul class="perks">
                <li>&#10003; Suivi de vos commandes en temps r&eacute;el</li>
                <li>&#10003; Points fid&eacute;lit&eacute; sur chaque achat</li>
                <li>&#10003; Wishlist et adresses sauvegard&eacute;es</li>
                <li>&#10003; Offres exclusives r&eacute;serv&eacute;es aux membres</li>
            </ul>

            <div class="auth-error" id="authError"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Pr&eacute;nom</label>
                    <input type="text" id="name" required autocomplete="given-name">
                </div>
                <div class="form-group">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe (8 caract&egrave;res min.)</label>
                    <input type="password" id="password" required minlength="8" autocomplete="new-password">
                    <div class="pwd-strength" id="pwdStrength"></div>
                </div>
                <button type="submit" class="auth-btn" id="submitBtn">Cr&eacute;er mon compte</button>
            </form>

            <div class="auth-links">
                <p>D&eacute;j&agrave; un compte ? <a href="login.html">Se connecter</a></p>
            </div>
        </div>
    </div>

    <script>
        var form = document.getElementById('registerForm');
        var errorEl = document.getElementById('authError');
        var btn = document.getElementById('submitBtn');
        var pwdInput = document.getElementById('password');
        var pwdBar = document.getElementById('pwdStrength');

        // Password strength indicator
        pwdInput.addEventListener('input', function() {
            var val = pwdInput.value;
            var strength = 0;
            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;
            var colors = ['#ef4444', '#f59e0b', '#22c55e', '#16a34a'];
            pwdBar.style.width = (strength * 25) + '%';
            pwdBar.style.background = colors[Math.max(0, strength - 1)] || '#e5e7eb';
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Cr\u00e9ation...';

            try {
                var resp = await fetch('/api/v2/auth?action=signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                var data = await resp.json();

                if (!resp.ok) {
                    errorEl.textContent = data.error || 'Erreur lors de la cr\u00e9ation';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Cr\u00e9er mon compte';
                    return;
                }

                // Connecter automatiquement
                var loginResp = await fetch('/api/v2/auth?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                var loginData = await loginResp.json();

                if (loginResp.ok) {
                    localStorage.setItem('eclat_session', JSON.stringify(loginData.session));
                    localStorage.setItem('eclat_user', JSON.stringify(loginData.user));
                }

                window.location.href = 'account.html';

            } catch (err) {
                errorEl.textContent = 'Erreur r\u00e9seau. R\u00e9essayez.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Cr\u00e9er mon compte';
            }
        });

        if (localStorage.getItem('eclat_session')) {
            window.location.href = 'account.html';
        }
    </script>
</body>
</html>

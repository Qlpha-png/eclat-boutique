  <rect x="710" y="322" width="7" height="7" fill="#c9a87c" opacity="0.6" transform="rotate(45 713.5 325.5)"/>
  <text x="733" y="331" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#ffffff" opacity="0.65">Diagnostic beaute IA gratuit</text>

  <rect x="710" y="362" width="7" height="7" fill="#c9a87c" opacity="0.6" transform="rotate(45 713.5 365.5)"/>
  <text x="733" y="371" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#ffffff" opacity="0.65">Transparence 100% ingredients</text>

  <rect x="710" y="402" width="7" height="7" fill="#c9a87c" opacity="0.6" transform="rotate(45 713.5 405.5)"/>
  <text x="733" y="411" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#ffffff" opacity="0.65">Livraison France - Paiement securise</text>

  <!-- Website -->
  <text x="1500" y="575" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="16" letter-spacing="2" fill="#c9a87c" opacity="0.6">maison-eclat.shop</text>
</svg>
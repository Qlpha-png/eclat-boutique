<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dcc49c"/>
      <stop offset="40%" stop-color="#c9a87c"/>
      <stop offset="100%" stop-color="#b08d5e"/>
    </linearGradient>
    <!-- Light gold for accent -->
    <linearGradient id="lightGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4b896"/>
      <stop offset="50%" stop-color="#e8d5b5"/>
      <stop offset="100%" stop-color="#c9a87c"/>
    </linearGradient>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#1a1714"/>
      <stop offset="100%" stop-color="#0f0d0b"/>
    </radialGradient>
    <!-- Subtle glow behind text -->
    <radialGradient id="glow" cx="50%" cy="48%" r="25%">
      <stop offset="0%" stop-color="#c9a87c" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#c9a87c" stop-opacity="0"/>
    </radialGradient>
    <!-- Sparkle gradient for É accent -->
    <radialGradient id="sparkle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0e0c4" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#dcc49c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9a87c" stop-opacity="0"/>
    </radialGradient>
    <!-- Fine line gradient -->
    <linearGradient id="fineLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a87c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a87c" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c9a87c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background: near-black for maximum contrast -->
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>

  <!-- =============================== -->
  <!-- MONOGRAMME: É stylisé avec éclat -->
  <!-- =============================== -->

  <!-- Sparkle/Diamond accent above É (the signature element) -->
  <!-- Main diamond -->
  <polygon points="400,255 406,268 400,281 394,268" fill="url(#lightGold)" opacity="0.85"/>
  <!-- Light rays from diamond -->
  <line x1="400" y1="248" x2="400" y2="238" stroke="#dcc49c" stroke-width="1" opacity="0.5"/>
  <line x1="410" y1="258" x2="417" y2="251" stroke="#dcc49c" stroke-width="0.7" opacity="0.35"/>
  <line x1="390" y1="258" x2="383" y2="251" stroke="#dcc49c" stroke-width="0.7" opacity="0.35"/>
  <!-- Tiny sparkle dots -->
  <circle cx="400" cy="233" r="1.2" fill="#e8d5b5" opacity="0.4"/>
  <circle cx="420" cy="247" r="0.8" fill="#e8d5b5" opacity="0.3"/>
  <circle cx="380" cy="247" r="0.8" fill="#e8d5b5" opacity="0.3"/>

  <!-- ===================== -->
  <!-- BRAND NAME: É C L A T -->
  <!-- ===================== -->

  <!-- Didone-style ÉCLAT using path for perfect control -->
  <!-- Using high-contrast serif style (thick verticals, hairline horizontals) -->

  <!-- Letter É -->
  <g transform="translate(210, 300)">
    <!-- Vertical stem -->
    <rect x="0" y="0" width="14" height="120" fill="url(#gold)"/>
    <!-- Top horizontal (hairline) -->
    <rect x="0" y="0" width="72" height="3" fill="url(#gold)"/>
    <!-- Middle horizontal (hairline) -->
    <rect x="0" y="58" width="58" height="2.5" fill="url(#gold)"/>
    <!-- Bottom horizontal (hairline) -->
    <rect x="0" y="117" width="72" height="3" fill="url(#gold)"/>
    <!-- Accent (acute) - THE SIGNATURE: a golden slash -->
    <line x1="32" y1="-8" x2="55" y2="-28" stroke="url(#lightGold)" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Letter C -->
  <g transform="translate(305, 300)">
    <!-- Approximation of a Didone C using curves -->
    <path d="M68,8 C45,-4 18,2 8,25 C-2,48 -2,75 8,97 C18,119 45,125 68,114" fill="none" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
    <!-- Thin serifs at terminals -->
    <rect x="60" y="2" width="18" height="2.5" fill="url(#gold)"/>
    <rect x="60" y="116" width="18" height="2.5" fill="url(#gold)"/>
  </g>

  <!-- Letter L -->
  <g transform="translate(400, 300)">
    <!-- Vertical stem -->
    <rect x="0" y="0" width="14" height="120" fill="url(#gold)"/>
    <!-- Bottom horizontal (hairline) -->
    <rect x="0" y="117" width="65" height="3" fill="url(#gold)"/>
    <!-- Top serif -->
    <rect x="-8" y="0" width="30" height="2.5" fill="url(#gold)"/>
  </g>

  <!-- Letter A -->
  <g transform="translate(478, 300)">
    <!-- Left diagonal -->
    <polygon points="37,0 44,0 14,120 0,120" fill="url(#gold)"/>
    <!-- Right diagonal -->
    <polygon points="37,0 44,0 74,120 60,120" fill="url(#gold)"/>
    <!-- Crossbar (hairline) -->
    <rect x="12" y="72" width="50" height="2.5" fill="url(#gold)"/>
    <!-- Apex detail -->
    <polygon points="37,-2 44,-2 42,4 39,4" fill="url(#gold)"/>
    <!-- Bottom serifs -->
    <rect x="-6" y="117" width="26" height="3" fill="url(#gold)"/>
    <rect x="54" y="117" width="26" height="3" fill="url(#gold)"/>
  </g>

  <!-- Letter T -->
  <g transform="translate(568, 300)">
    <!-- Vertical stem -->
    <rect x="30" y="3" width="14" height="117" fill="url(#gold)"/>
    <!-- Top horizontal (full width, hairline) -->
    <rect x="0" y="0" width="74" height="3" fill="url(#gold)"/>
    <!-- Bottom serif -->
    <rect x="22" y="117" width="30" height="2.5" fill="url(#gold)"/>
  </g>

  <!-- ================= -->
  <!-- SEPARATOR + PARIS -->
  <!-- ================= -->

  <!-- Thin separator line -->
  <line x1="280" y1="445" x2="520" y2="445" stroke="url(#fineLine)" stroke-width="0.8"/>

  <!-- Subtitle: PARIS (brand origin) -->
  <text x="400" y="478" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" letter-spacing="12" fill="#c9a87c" opacity="0.5">PARIS</text>

  <!-- ======================== -->
  <!-- OUTER FRAME (very subtle) -->
  <!-- ======================== -->

  <!-- Single thin square frame -->
  <rect x="55" y="55" width="690" height="690" rx="0" fill="none" stroke="#c9a87c" stroke-width="0.6" opacity="0.12"/>
</svg>